{% extends 'base.html' %}
{% block content %}
<div class="site-card p-4">
  <h2 class="page-title mb-3">{{ title }}</h2>
  <p class="muted">Are you sure you want to delete: <strong>{{ object }}</strong>?</p>
  <form method="post">{% csrf_token %}
    <button class="btn btn-danger" type="submit">Delete</button>
    <a class="btn btn-outline-dark" href="javascript:history.back()">Cancel</a>
  </form>
</div>
{% endblock %}
