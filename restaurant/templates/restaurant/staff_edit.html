{% extends 'base.html' %}
{% block content %}
<div class="site-card p-4">
  <h2 class="page-title mb-3">Edit {{ role|title }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">Name</label><input class="form-control" type="text" name="name" value="{{ staff.name }}" required></div>
    <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" type="text" name="phone" value="{{ staff.phone }}" required></div>
    <button class="btn btn-dark" type="submit">Save</button>
  </form>
</div>
{% endblock %}
